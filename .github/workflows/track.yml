name: Track flight prices

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 00:00 UTC = 09:00 KST (도시 3개 = 일 3회 → 월 ~90회, SerpApi 무료 250회 안)
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch prices
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: node scripts/fetch-prices.mjs

      - name: Commit updated data
        run: |
          git config user.name "flight-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/latest.json data/history.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: update prices $(date -u +%Y-%m-%d)"
            git push
          fi
