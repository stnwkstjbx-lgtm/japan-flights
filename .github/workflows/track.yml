name: Track flight prices

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 00:00 UTC = 09:00 KST (도시 3개 = 일 3회 → 월 ~90회, SerpApi 무료 250회 안)
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch prices
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: node scripts/fetch-prices.mjs

      - name: Check alert
        id: alert
        run: |
          SEND=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('data/alert.json','utf8')).send?'true':'false')}catch(e){console.log('false')}")
          echo "send=$SEND" >> "$GITHUB_OUTPUT"
          if [ "$SEND" = "true" ]; then
            echo "subject=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/alert.json','utf8')).subject)")" >> "$GITHUB_OUTPUT"
          fi

      - name: Send price-alert email
        if: steps.alert.outputs.send == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.naver.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: ${{ secrets.MAIL_USERNAME }}@naver.com
          to: jaydsu@naver.com
          subject: ${{ steps.alert.outputs.subject }}
          html_body: file://data/alert-body.html

      - name: Commit updated data
        run: |
          git config user.name "stnwkstjbx-lgtm"
          git config user.email "254588511+stnwkstjbx-lgtm@users.noreply.github.com"
          git add data/latest.json data/history.json data/alert-state.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: update prices $(date -u +%Y-%m-%d)"
            git push
          fi
